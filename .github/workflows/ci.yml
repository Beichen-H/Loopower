name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate prompt-to-loop-engineering
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -B -m unittest discover -s skills/prompt-to-loop-engineering/scripts -p "test_*.py" -v

      - name: Parse published JSON contracts
        shell: bash
        run: |
          find skills/prompt-to-loop-engineering -name '*.json' -print0 \
            | xargs -0 -n1 python -m json.tool >/dev/null

      - name: Validate bundled scaffold
        run: python -B skills/prompt-to-loop-engineering/scripts/validate_codex_loop_scaffold.py skills/prompt-to-loop-engineering/examples/codex-loop

      - name: Validate DAG execution evidence
        run: python -B skills/prompt-to-loop-engineering/scripts/validate_dag_execution_evidence.py skills/prompt-to-loop-engineering/examples/codex-loop

      - name: Validate loop progress evidence
        run: python -B skills/prompt-to-loop-engineering/scripts/validate_loop_progress_evidence.py skills/prompt-to-loop-engineering/examples/codex-loop

      - name: Validate skill DAG
        run: python -B skills/prompt-to-loop-engineering/scripts/test_spec_loading.py

      - name: Validate published agent-loop example
        shell: bash
        run: |
          mkdir -p .ci
          python -B skills/prompt-to-loop-engineering/scripts/normalize_design_request.py \
            skills/prompt-to-loop-engineering/examples/requests/agent_loop.json \
            --output .ci/effective-agent-loop-request.json \
            --report .ci/agent-loop-normalization-report.json
          python -B skills/prompt-to-loop-engineering/scripts/validate_design_result.py \
            skills/prompt-to-loop-engineering/examples/agent_loop.json \
            --request .ci/effective-agent-loop-request.json \
            --raw-request skills/prompt-to-loop-engineering/examples/requests/agent_loop.json \
            --normalization-report .ci/agent-loop-normalization-report.json

  windows-install:
    name: Validate Windows install and tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -B -m unittest discover -s skills/prompt-to-loop-engineering/scripts -p "test_*.py" -v

      - name: Verify first install
        shell: pwsh
        run: python install_local.py --target "$env:RUNNER_TEMP\codex-skills" --verify

      - name: Verify repeat install
        shell: pwsh
        run: python install_local.py --target "$env:RUNNER_TEMP\codex-skills" --force --verify
